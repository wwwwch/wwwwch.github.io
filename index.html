<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LeetCode 笔记索引</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f5f8;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #667085;
      --line: #d9dee7;
      --line-soft: #edf0f5;
      --accent: #0f766e;
      --accent-2: #f59e0b;
      --accent-soft: #e6f4f1;
      --accent-2-soft: #fff5db;
      --shadow: 0 18px 45px rgba(16, 24, 40, 0.09);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.12), transparent 34%),
        linear-gradient(315deg, rgba(245, 158, 11, 0.13), transparent 32%),
        var(--bg);
    }

    .page {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 56px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 380px);
      align-items: end;
      gap: 24px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 15px;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 22px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 7px 12px;
      border: 1px solid rgba(15, 118, 110, 0.18);
      border-radius: 999px;
      color: #175f59;
      background: rgba(255, 255, 255, 0.76);
      font-size: 14px;
      box-shadow: 0 8px 18px rgba(16, 24, 40, 0.05);
    }

    .chip strong {
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .tools {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: min(360px, 100%);
    }

    .search {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      color: var(--text);
      background: var(--panel);
      font: inherit;
      outline: none;
      box-shadow: 0 10px 24px rgba(16, 24, 40, 0.07);
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .list {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .table-head {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr) 28px;
      gap: 14px;
      padding: 11px 18px;
      color: var(--muted);
      background: #f9fafb;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      font-weight: 700;
    }

    .note {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr) 28px;
      align-items: center;
      gap: 14px;
      min-height: 54px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line-soft);
      color: inherit;
      text-decoration: none;
      background: #fff;
      transition: background 140ms ease, color 140ms ease;
    }

    .note:nth-child(even) {
      background: #fbfcfd;
    }

    .note:last-child {
      border-bottom: 0;
    }

    .note:hover,
    .note:focus-visible {
      background: linear-gradient(90deg, var(--accent-soft), #fff);
      outline: none;
    }

    .note:hover .arrow,
    .note:focus-visible .arrow {
      color: var(--accent);
      transform: translateX(2px);
    }

    .number {
      display: block;
      color: var(--accent);
      font-weight: 700;
      font-size: 15px;
      line-height: 1.3;
      font-variant-numeric: tabular-nums;
    }

    .number::before {
      content: "";
      display: inline-block;
      width: 7px;
      height: 7px;
      margin-right: 8px;
      border-radius: 50%;
      background: var(--accent-2);
      vertical-align: 1px;
    }

    .title {
      margin: 0;
      font-size: 16px;
      line-height: 1.42;
      font-weight: 600;
      overflow-wrap: anywhere;
    }

    .arrow {
      color: #98a2b3;
      font-size: 20px;
      line-height: 1;
      text-align: right;
      transition: color 140ms ease, transform 140ms ease;
    }

    .empty,
    .error {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
    }

    .error {
      color: #b42318;
      border-color: #f2b8b5;
      background: #fff3f2;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 22px, 1080px);
        padding-top: 28px;
      }

      header {
        display: grid;
        grid-template-columns: 1fr;
        align-items: start;
      }

      .tools {
        width: 100%;
      }

      .table-head,
      .note {
        grid-template-columns: 64px minmax(0, 1fr) 20px;
        gap: 10px;
        padding-inline: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <h1>LeetCode 笔记</h1>
        <div class="meta" id="meta">正在读取笔记...</div>
      </div>
      <div class="tools">
        <input class="search" id="search" type="search" placeholder="搜索题号或标题" autocomplete="off">
      </div>
    </header>

    <section class="summary" aria-label="笔记概览">
      <span class="chip">当前收录 <strong id="totalCount">0</strong> 篇</span>
      <span class="chip">题号范围 <strong id="rangeText">-</strong></span>
      <span class="chip">点击题目打开笔记</span>
    </section>

    <section class="list" aria-live="polite">
      <div class="table-head" aria-hidden="true">
        <span>题号</span>
        <span>标题</span>
        <span></span>
      </div>
      <div id="notes"></div>
    </section>
  </main>

  <script>
    const notesEl = document.querySelector("#notes");
    const metaEl = document.querySelector("#meta");
    const searchEl = document.querySelector("#search");
    const totalCountEl = document.querySelector("#totalCount");
    const rangeTextEl = document.querySelector("#rangeText");

    let allNotes = [];

    function normalizeText(value) {
      return String(value || "").toLowerCase().trim();
    }

    function displayTitle(note) {
      const title = note.title || "未命名笔记";
      if (!note.number) {
        return title;
      }

      return title
        .replace(new RegExp(`^\\s*LeetCode\\s+${note.number}\\s*`, "i"), "")
        .replace(new RegExp(`^\\s*${note.number}\\s*[.．、-]?\\s*`), "")
        .trim() || title;
    }

    function render(notes) {
      notesEl.innerHTML = "";

      if (!notes.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = searchEl.value ? "没有匹配的笔记。" : "还没有生成笔记清单。";
        notesEl.appendChild(empty);
        return;
      }

      const fragment = document.createDocumentFragment();

      for (const note of notes) {
        const link = document.createElement("a");
        link.className = "note";
        link.href = `html/${encodeURIComponent(note.file)}`;

        const number = document.createElement("span");
        number.className = "number";
        number.textContent = note.number ? note.number : "HTML";

        const title = document.createElement("p");
        title.className = "title";
        title.textContent = displayTitle(note);

        const arrow = document.createElement("span");
        arrow.className = "arrow";
        arrow.setAttribute("aria-hidden", "true");
        arrow.textContent = "›";

        link.append(number, title, arrow);
        fragment.appendChild(link);
      }

      notesEl.appendChild(fragment);
    }

    function applyFilter() {
      const query = normalizeText(searchEl.value);
      const filtered = query
        ? allNotes.filter(note => normalizeText(`${note.number} ${displayTitle(note)}`).includes(query))
        : allNotes;
      render(filtered);
      metaEl.textContent = query
        ? `共 ${allNotes.length} 篇，当前显示 ${filtered.length} 篇`
        : `共 ${allNotes.length} 篇笔记，按题号排序`;
    }

    async function loadNotes() {
      try {
        const response = await fetch("html/notes.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        allNotes = await response.json();
        allNotes.sort((a, b) => (a.number ?? Number.MAX_SAFE_INTEGER) - (b.number ?? Number.MAX_SAFE_INTEGER));
        const numbered = allNotes.map(note => note.number).filter(Number.isFinite);
        totalCountEl.textContent = allNotes.length;
        rangeTextEl.textContent = numbered.length ? `${Math.min(...numbered)} - ${Math.max(...numbered)}` : "-";
        applyFilter();
      } catch (error) {
        metaEl.textContent = "读取失败";
        notesEl.innerHTML = "";
        const box = document.createElement("div");
        box.className = "error";
        box.textContent = "无法读取 html/notes.json。新增或修改笔记后，请先运行 scripts/generate-notes-index.ps1 生成清单。";
        notesEl.appendChild(box);
      }
    }

    searchEl.addEventListener("input", applyFilter);
    loadNotes();
  </script>
</body>
</html>
